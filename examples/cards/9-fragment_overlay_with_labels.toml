# Overlay TIC with fragments per class, using labels for legend entries.

[global]
pivot_chart = "{{CLASS}}"
chart_style = ["line", "scatter"]
overlay_variable = "{{FRAG}}"
overlay_filter = "^[0-9.]+$"
series_label = ["TIC", "Fragment"]

filepath = [
  "<CARD_DIR>/../../__data/R10_Standard_Mixes/iterative_excL_20eV/TIC.json",
  "<CARD_DIR>/../../__data/R10_Standard_Mixes/iterative_excL_20eV/{{CLASS}}/ms2_frag-{{FRAG}}.json"
]
