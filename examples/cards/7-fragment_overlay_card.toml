# Overlay fragments per class with a shared chromatogram line.
# Demonstrates `overlay_variable` to auto-enumerate fragment scatters for each CLASS.

[global]
pivot_chart = "{{CLASS}}"
chart_style = ["line", "scatter"]
overlay_variable = "{{FRAG}}"

filepath = [
  "<CARD_DIR>/../../__data/R10_Standard_Mixes/iterative_excL_20eV/TIC.json",
  "<CARD_DIR>/../../__data/R10_Standard_Mixes/iterative_excL_20eV/{{CLASS}}/ms2_frag-{{FRAG}}_scatter.json"
]
